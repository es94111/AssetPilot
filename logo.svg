<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="barGrad1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#c4b5fd"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    <linearGradient id="barGrad3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#e9d5ff"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- 圓角方形背景 -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>
  <!-- 上升趨勢柱狀圖 -->
  <rect x="100" y="310" width="56" height="110" rx="10" fill="url(#barGrad1)" opacity="0.9"/>
  <rect x="180" y="250" width="56" height="170" rx="10" fill="url(#barGrad2)" opacity="0.9"/>
  <rect x="260" y="190" width="56" height="230" rx="10" fill="url(#barGrad3)" opacity="0.95"/>
  <!-- 趨勢折線 -->
  <polyline points="128,290 208,230 288,165 380,120" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 箭頭 -->
  <polygon points="380,120 350,115 365,145" fill="#ffffff"/>
  <!-- 金幣 -->
  <circle cx="388" cy="310" r="60" fill="url(#coinGrad)" stroke="#ffffff" stroke-width="8"/>
  <text x="388" y="330" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="64" fill="#ffffff">$</text>
</svg>
