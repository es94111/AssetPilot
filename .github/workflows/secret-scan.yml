name: Secret scan (gitleaks)

on:
  push:
    branches: [main, dev]
  pull_request:
  schedule:
    # 每週一 01:00 UTC = 09:00 Asia/Taipei
    - cron: "0 1 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE 只有 organization 帳號才需要；
          # personal account 的 repo（如本專案）免費，留空即可。
