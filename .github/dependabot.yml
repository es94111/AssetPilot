version: 2

updates:
  # ── Node.js 套件（root package.json） ──
  - package-ecosystem: npm
    directory: "/"
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Taipei
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: scope
    labels:
      - dependencies
      - npm
    groups:
      npm-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"

  # ── GitHub Actions（.github/workflows/*.yml） ──
  - package-ecosystem: github-actions
    directory: "/"
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Taipei
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(ci)"
      include: scope
    labels:
      - dependencies
      - github-actions
    groups:
      actions-all:
        patterns:
          - "*"

  # ── Docker base image（Dockerfile） ──
  - package-ecosystem: docker
    directory: "/"
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Taipei
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(docker)"
      include: scope
    labels:
      - dependencies
      - docker
    # 禁止 base image major 升級（避免 node 24 → 25/26 等不穩定/非 LTS 跳躍）；
    # 仍接受 minor/patch（如 node:24.x 安全更新）
    ignore:
      - dependency-name: "node"
        update-types:
          - "version-update:semver-major"
