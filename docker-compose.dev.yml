services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=vitatrack
      - POSTGRES_USER=vitatrack
      - POSTGRES_PASSWORD=devpassword
    volumes:
      - dev_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitatrack"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  dev_db_data:
