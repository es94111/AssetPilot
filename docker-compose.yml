services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY:-vitatrack/vitatrack}:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-24h}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vitatrack-net

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-vitatrack}
      - POSTGRES_USER=${POSTGRES_USER:-vitatrack}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vitatrack}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vitatrack-net

  # 反向代理（可選，搭配 SSL）
  # nginx:
  #   image: nginx:alpine
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf
  #     - /etc/letsencrypt:/etc/letsencrypt:ro
  #   depends_on:
  #     - app
  #   networks:
  #     - vitatrack-net

volumes:
  db_data:

networks:
  vitatrack-net:
    driver: bridge
