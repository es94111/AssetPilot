<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- 簡化柱狀圖 -->
  <rect x="11" y="38" width="9" height="16" rx="2" fill="rgba(255,255,255,0.7)"/>
  <rect x="23" y="30" width="9" height="24" rx="2" fill="rgba(255,255,255,0.8)"/>
  <rect x="35" y="22" width="9" height="32" rx="2" fill="rgba(255,255,255,0.9)"/>
  <!-- 金幣 -->
  <circle cx="50" cy="38" r="8" fill="url(#coin)" stroke="#fff" stroke-width="1.5"/>
  <text x="50" y="42" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="11" fill="#fff">$</text>
  <!-- 趨勢線 -->
  <polyline points="15,35 27,27 39,18 49,13" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="49,13 44,13 47,18" fill="#fff"/>
</svg>
